services:
  # 1. Container PHP-FPM
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-app
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - laravel_network

  # 2. Container Nginx
  web:
    image: nginx:alpine
    container_name: laravel_web
    restart: unless-stopped
    ports:
      - "80:80" # Port yang diakses dari luar (Kiri: VPS, Kanan: Container)
    volumes:
      - ./:/var/www
      - ./docker-compose/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel_network

  # 3. Container MySQL
  db:
    image: mariadb:10.11
    container_name: laravel_db
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel_network
  node:
    image: node:20-alpine
    container_name: laravel_node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "5173:5173" # Port bawaan Vite agar hot-reload jalan di browser
    command: sh -c "npm install && npm run dev"
    networks:
      - laravel_network

# Definisi Network
networks:
  laravel_network:
    driver: bridge

# Definisi Volume untuk menyimpan data DB agar tidak hilang saat container mati
volumes:
  db_data:
