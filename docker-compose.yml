services:
  # 1. Container PHP-FPM
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-app
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - laravel_network

  # 2. Container Nginx
  web:
    image: nginx:alpine
    container_name: laravel_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443" 
    env_file: .env 
    volumes:
      - ./:/var/www
      # Masukkan kedua file conf ke dalam container sementara
      - ./docker-compose/nginx.local.conf:/etc/nginx/nginx.local.conf
      - ./docker-compose/nginx.prod.conf:/etc/nginx/nginx.prod.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - laravel_network
    # Pengkondisian pemilihan file berdasarkan APP_ENV
    command: >
      sh -c "
        if [ '${APP_ENV}' = 'local' ]; then
          echo 'Menjalankan Nginx untuk LOKAL (HTTP 80)...';
          cp /etc/nginx/nginx.local.conf /etc/nginx/conf.d/default.conf;
        elif [ '${APP_ENV}' = 'staging' ]; then
          echo 'Menjalankan Nginx untuk STAGING (HTTP 80 untuk Certbot)...';
          cp /etc/nginx/nginx.local.conf /etc/nginx/conf.d/default.conf;
        else
          echo 'Menjalankan Nginx untuk PRODUKSI (HTTPS 443)...';
          cp /etc/nginx/nginx.prod.conf /etc/nginx/conf.d/default.conf;
        fi &&
        nginx -g 'daemon off;'
      "

  # 3. Container MySQL
  db:
    image: mariadb:10.11
    container_name: laravel_db
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel_network
  node:
    image: node:20-alpine
    container_name: laravel_node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "5173:5173" # Port bawaan Vite agar hot-reload jalan di browser
    env_file: .env
    command: >
      sh -c "
        npm install &&
        if [ '${APP_ENV}' = 'local' ]; then
          echo 'Menjalankan Vite Dev Server untuk lokal...';
          npm run dev;
        elif [ '${APP_ENV}' = 'staging' ]; then
          echo 'Membangun aset statis untuk STAGING...';
          npm run build;
        else
          echo 'Membangun aset statis untuk PRODUKSI...';
          npm run build;
        fi
      "
    networks:
      - laravel_network

# Definisi Network
networks:
  laravel_network:
    driver: bridge

# Definisi Volume untuk menyimpan data DB agar tidak hilang saat container mati
volumes:
  db_data:
